        <section class="orderpage">
            <h1>Order Here</h1>
            <form method="post" action="https://jkorpela.fi/cgi-bin/echo.cgi">
                <fieldset class="orderfieldset">
                    <legend class="orderdetails">Personal Details</legend>
                    <div class="personal">
                        <label>Name:</label><br>
                        <input type="text" name="myName" placeholder="Enter your name" required>
                        <br><br>
                        <label>Phone Number:</label><br>
                        <input type="tel" name="myPhone" pattern="[689]{1}[0-9]{7}" placeholder="Enter your phone number" required>
                        <br><br>
                        <label>Email:</label><br>
                        <input type="email" name="myEmail" placeholder="Enter valid Email Address" required>
                        <br>
                    </div>
                </fieldset>
                <div class="ordercontainer">
                <fieldset class="orderfieldset">
                    <legend class="orderdetails">Drink Order</legend>
                    <div class="drinkorder">
                        <label>Select your drink: </label><br>
                        <select name="myDrink">
                            <option value="" disabled selected>Select a drink</option>
                            <option value="1">Kopi</option>
                            <option value="2">Kopi O</option>
                            <option value="3">Kopi C</option>
                            <option value="4">Teh</option>
                            <option value="5">Teh O</option>
                            <option value="6">Teh C</option>
                            <option value="7">Yuan Yang</option>
                            <option value="8">Yuan Yang C</option>
                            <option value="9">Milo</option>
                            <option value="10">Bandung (Cold only)</option>
                            <option value="11">Ice Lemon Tea (Cold only)</option>
                            <option value="12">Iced Rose Water (Cold only)</option>
                            <option value="13">Ribena (Cold only)</option>
                            <option value="14">None</option>
                        </select>
                        <br><br>
                        <input type="radio" name="myGender" value="1">Hot       
                        <input type="radio" name="myGender" value="2">Cold
                        <br><br>
                        <label>Enter quantity:</label><br>
                        <input type="number" name="myQuantity">
                        <br><br>
                        <label>Other requests:</label><br>
                        <textarea name="myFeedback" rows="3" cols="40"></textarea>
                    </div>
                </fieldset>
                <fieldset class="orderfieldset">
                    <legend class="orderdetails">Breakfast Order</legend>
                    <div class="foodorder">
                        <label>Select your breakfast set:</label><br>
                        <select name="mySet">
                            <option value="" disabled selected>Select a breakfast set</option>
                            <option value="15">Breakfast set 1</option>
                            <option value="16">Breakfast set 2</option>
                            <option value="17">Breakfast set 3</option>
                            <option value="18">None</option>
                        </select>
                        <br><br>
                        <label>Select your drink of choice:</label><br>
                        <select name="mySetDrink">
                            <option value="" disabled selected>Select your drink of choice</option>
                            <option value="1">Kopi</option>
                            <option value="2">Kopi O</option>
                            <option value="3">Kopi C</option>
                            <option value="4">Teh</option>
                            <option value="5">Teh O</option>
                            <option value="6">Teh C</option>
                            <option value="7">Yuan Yang</option>
                            <option value="8">Yuan Yang C</option>
                            <option value="9">Milo</option>
                        </select>
                        <br><br>
                        <label>Enter quantity:</label><br>
                        <input type="number" name="myQuantity">
                        <br><br>
                        <label>Other requests:</label><br>
                        <textarea name="myFeedback" rows="3" cols="40"></textarea>
                    </div>
                </fieldset>
                </div>
                <div class="orderbuttons">
                    <a href="menu.html" class="buttoncta">See Menu</a> 
                    <button type="submit">Add to cart</button>
                    <button type="reset">Cancel</button>                  
                </div>
            </form>
        </section>
